[build]
builder = "nixpacks"

[[services]]
name = "grants-backend"
source = "backend"
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"

[services.variables]
ENVIRONMENT = "production"

[[services]]
name = "grants-frontend"
source = "frontend"
buildCommand = "npm install && npm run build"
startCommand = "npx serve dist -p $PORT"
